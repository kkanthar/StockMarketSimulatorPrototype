<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In The Black | Terminal Access</title>
    <style>
        :root {
            --bbg-bg: #050505;
            --bbg-panel: #111111;
            --bbg-border: #2a2a2a;
            --bbg-text-main: #f5f5f5;
            --bbg-text-muted: #888888;
            --bbg-orange: #f37021;
            --font-stack: 'Neue Haas Grotesk', 'Aktiv Grotesk', 'Inter', sans-serif;
        }
        * { box-sizing: border-box; font-family: var(--font-stack); }
        body {
            background-color: var(--bbg-bg);
            color: var(--bbg-text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .auth-container {
            background: var(--bbg-panel);
            border: 1px solid var(--bbg-border);
            border-top: 4px solid var(--bbg-orange);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { margin-top: 0; color: var(--bbg-orange); font-size: 1.5rem; letter-spacing: 1px; }
        p { color: var(--bbg-text-muted); font-size: 0.9rem; margin-bottom: 25px; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--bbg-bg);
            border: 1px solid var(--bbg-border);
            color: white;
            font-size: 1rem;
            text-align: center;
            text-transform: uppercase;
        }
        input:focus { outline: none; border-color: var(--bbg-orange); }
        button {
            width: 100%;
            padding: 12px;
            background: var(--bbg-orange);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.15s;
        }
        button:hover { filter: brightness(1.1); }
        #error-msg { color: #ff3b30; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>IN THE BLACK</h1>
        <p>TERMINAL ACCESS</p>
        <input type="text" id="access-code" placeholder="Enter Access Code" autocomplete="off">
        <button onclick="login()">Authenticate</button>
        <div id="error-msg">INVALID ACCESS CODE</div>
    </div>

    <script type="module">
        import { authenticate } from './firebase-config.js';

        window.login = async () => {
            const code = document.getElementById('access-code').value.trim().toUpperCase();
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const user = await authenticate(code);
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'participant.html';
                }
            } catch (error) {
                errorMsg.style.display = 'block';
                console.error("Auth Error:", error);
            }
        };

        // Listen for Enter key
        document.getElementById('access-code').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>

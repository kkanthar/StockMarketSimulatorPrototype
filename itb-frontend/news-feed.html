<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In The Black | LIVE TERMINAL FEED</title>
    <style>
        :root {
            --bbg-bg: #050505; --bbg-panel: #111111; --bbg-border: #2a2a2a;
            --bbg-text-main: #f5f5f5; --bbg-text-muted: #888888;
            --bbg-orange: #f37021; --bbg-green: #00e676; --bbg-red: #ff3b30;
            --font-stack: 'Neue Haas Grotesk', 'Aktiv Grotesk', 'Inter', sans-serif;
        }
        * { box-sizing: border-box; font-family: var(--font-stack); }
        body {
            background-color: var(--bbg-bg); color: var(--bbg-text-main);
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        .header {
            border-bottom: 2px solid var(--bbg-border); padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bbg-bg); z-index: 100;
        }
        h1 { color: var(--bbg-orange); margin: 0; font-size: 2.5rem; letter-spacing: 1px; text-transform: uppercase; }
        .font-mono { font-family: 'SF Mono', Consolas, monospace; font-variant-numeric: tabular-nums; }

        .controls { display: flex; gap: 20px; align-items: center; }
        .status-badge { padding: 8px 16px; border: 1px solid var(--bbg-border); font-size: 1.2rem; font-weight: bold; }
        #mode-badge.live { color: var(--bbg-green); border-color: var(--bbg-green); }
        #mode-badge.mock { color: var(--bbg-orange); border-color: var(--bbg-orange); }

        button {
            padding: 12px 24px; border: 1px solid var(--bbg-border);
            background: transparent; color: white; cursor: pointer;
            text-transform: uppercase; font-weight: bold; font-size: 1.2rem; transition: 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.1); }
        #btn-pause { border-left: 6px solid var(--bbg-orange); }
        #btn-pause.paused { border-left-color: var(--bbg-green); color: var(--bbg-green); }

        .feed-container {
            flex-grow: 1; padding: 40px; overflow-y: hidden; position: relative;
        }
        #cards-wrap { display: flex; flex-direction: column; gap: 20px; height: 100%; }

        .news-card {
            background: var(--bbg-panel); border: 1px solid var(--bbg-border);
            border-left: 8px solid var(--bbg-border);
            padding: 25px; border-radius: 4px;
            opacity: 0; transform: translateY(20px);
            animation: slideIn 0.5s forwards ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .news-card.urgent { border-left-color: var(--bbg-red); }
        .news-card.positive { border-left-color: var(--bbg-green); }
        .news-card.rumor { border-left-color: var(--bbg-orange); }

        .news-meta {
            display: flex; justify-content: space-between;
            color: var(--bbg-text-muted); font-size: 1rem; margin-bottom: 10px; text-transform: uppercase;
        }
        .news-headline { font-size: 2.2rem; margin: 0 0 10px 0; line-height: 1.3; }
        .news-body { font-size: 1.4rem; color: #cccccc; margin: 0; }
        .tag { background: #222; padding: 4px 8px; border-radius: 4px; color: var(--bbg-orange); font-weight: bold; }

        .mover-badge {
            margin-top: 14px; font-size: 1.1rem; padding: 4px 12px;
            border: 1px solid var(--bbg-border); border-radius: 4px; display: inline-block;
        }

        /* Ticker Tape at the bottom */
        .ticker-wrap {
            width: 100%; background: var(--bbg-panel); border-top: 1px solid var(--bbg-border);
            padding: 15px 0; overflow: hidden; white-space: nowrap; box-sizing: border-box;
        }
        .ticker {
            display: inline-block; white-space: nowrap; padding-left: 100%;
            animation: ticker 30s linear infinite; font-size: 1.5rem; font-weight: bold;
        }
        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
        .ticker-item { margin-right: 50px; }
        .text-green { color: var(--bbg-green); } .text-red { color: var(--bbg-red); }

        /* Pause / Session-ended Overlay */
        #pause-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,5,5,0.85); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center;
            z-index: 50; flex-direction: column;
        }
        #pause-overlay h2 { font-size: 4rem; color: var(--bbg-orange); margin: 0; }
        #pause-overlay p { font-size: 1.5rem; color: var(--bbg-text-muted); margin-top: 10px; }
    </style>
</head>

        // ============================================================================
        // 7. HELPERS
        // ============================================================================
        function fill(str, data) {
            return str.replace(/\{(\w+)\}/g, (_, k) => (data[k] !== undefined && data[k] !== null ? data[k] : ''));
        }
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function fmtPct(n) {
            const sign = n > 0 ? '+' : '';
            return `${sign}${n.toFixed(2)}%`;
        }
        function pctChange(stock) {
            if (!stock.prevPrice) return 0;
            return ((stock.price - stock.prevPrice) / stock.prevPrice) * 100;
        }
        function topMover(sector) {
            const pool = (sector === 'all') ? marketState.stocks : marketState.stocks.filter(s => s.sector === sector);
            if (!pool.length) return null;
            return pool.reduce((best, s) => Math.abs(pctChange(s)) > Math.abs(pctChange(best)) ? s : best, pool[0]);
        }
        function pickRandomSector() {
            const sectors = Object.keys(SECTOR_DEPENDENCIES);
            return sectors[Math.floor(Math.random() * sectors.length)];
        }
        function spilloverSentence(sector, tone) {
            const dep = SECTOR_DEPENDENCIES[sector];
            if (!dep) return '';
            if (tone === 'boom') return `Correlated flows are already lifting ${dep.correlated}, while ${dep.inverse} names lag on the rotation out.`;
            if (tone === 'crash') return `${dep.inverse} is catching a bid as capital rotates to safety, while ${dep.correlated} slides in sympathy.`;
            return `Desks are watching for spillover into ${dep.correlated} and ${dep.inverse}.`;
        }
        function classify(type) {
            const mod = INJECTION_MODIFIERS[type];
            if (!mod) return null;
            const scope = mod.targetSector === 'all' ? 'broad' : 'sector';
            const tone = mod.trend > 0 ? 'boom' : (mod.trend < 0 ? 'crash' : 'neutral');
            return { scope, tone, sector: mod.targetSector, volMultiplier: mod.volMultiplier, label: type.replace(/_/g, ' ').toUpperCase() };
        }

        // ============================================================================

        // ============================================================================
        function pushNews({ headline, body, type, tag, mover }) {
            const newsItem = {
                headline, body, type, tag, mover,
                time: new Date().toLocaleTimeString('en-US', { hour12: false }),
                day: marketState.day
            };
            newsArchive.unshift(newsItem);
            if (newsArchive.length > 20) newsArchive.pop();
            console.log(`[NEWS] (${tag}) ${headline}`);
        }

            const c = classify(type);
            if (!c) return;
            const mover = topMover(c.sector);
            const pct = mover ? fmtPct(pctChange(mover)) : fmtPct((Math.random() * 2 + 0.2));
            const sectorUpper = c.sector === 'all' ? 'THE BROADER MARKET' : c.sector.toUpperCase();
            const data = {
                label: c.label, sectorUpper, sector: c.sector, ticker: mover ? mover.ticker : 'THE TAPE',
                company: mover ? mover.name : 'Benchmark names', pct, volMultiplier: c.volMultiplier,
                spillover: c.scope === 'sector' ? spilloverSentence(c.sector, c.tone) : ''
            };

            const key = c.scope === 'broad'
                ? (c.tone === 'boom' ? 'broadBoom' : c.tone === 'crash' ? 'broadCrash' : 'broadNeutral')
                : (c.tone === 'crash' ? 'sectorCrash' : 'sectorBoom');

            const headline = fill(pick(HEADLINES[key]), data);
            const body = fill(pick(BODIES[key]), data);
            const uiType = c.tone === 'boom' ? 'positive' : (c.tone === 'crash' ? 'urgent' : 'urgent');

            pushNews({ headline, body, type: uiType, tag: c.label, mover: mover ? { ticker: mover.ticker, pct: pctChange(mover) } : null });
        }

        function generateDependencyRumor(sourceSector) {
            const dep = SECTOR_DEPENDENCIES[sourceSector];
            if (!dep) return;
            const isPositive = Math.random() > 0.5;
            const targetSector = isPositive ? dep.correlated : dep.inverse;
            const sentiment = isPositive ? 'positive spillover' : 'collateral damage';
            const data = {
                sourceSector, targetSector,
                sourceSectorUpper: sourceSector.toUpperCase(), targetSectorUpper: targetSector.toUpperCase(),
                sentiment
            };
            pushNews({
                headline: fill(pick(HEADLINES.rumor), data),
                body: fill(pick(BODIES.rumor), data),
                type: 'rumor', tag: 'RUMOR'
            });
        }

        function pushNeutralHeadline() {
            const mover = topMover('all');
            const pct = mover ? fmtPct(pctChange(mover)) : fmtPct(0);
            const data = { day: marketState.day, ticker: mover ? mover.ticker : 'the index', company: mover ? mover.name : 'The broad tape', pct };
            pushNews({
                headline: fill(pick(HEADLINES.neutral), data),
                body: fill(pick(BODIES.neutral), data),
                type: 'neutral', tag: 'MARKET',
                mover: mover ? { ticker: mover.ticker, pct: pctChange(mover) } : null
            });
        }

        function generateNews() {
            if (marketState.isPaused || marketState.sessionEnded) {
                console.log('[NEWS] Generation skipped — market paused/ended.');
                return;
            }
            console.log(`[NEWS] Generating headline for Day ${marketState.day}...`);

            const hasInjection = marketState.activeInjection && marketState.injectionTicksLeft > 0;
            const roll = Math.random();

            if (hasInjection) {
                pushInjectionHeadline(marketState.activeInjection);
                if (roll > 0.55) {
                    const mod = INJECTION_MODIFIERS[marketState.activeInjection];
                    const source = (mod && mod.targetSector !== 'all') ? mod.targetSector : pickRandomSector();
                    generateDependencyRumor(source);
                }
            } else if (roll > 0.6) {
                generateDependencyRumor(pickRandomSector());
            } else {
                pushNeutralHeadline();
            }
        }

        // ============================================================================
        // 9. UI RENDERING
        // ============================================================================
        function renderNewsUI() {
            if (marketState.isPaused) return;
            const wrap = document.getElementById('cards-wrap');
            wrap.innerHTML = '';

            const displayItems = newsArchive.slice(0, 4);
            displayItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `news-card ${item.type}`;
                card.style.animationDelay = `${index * 0.1}s`;
                const moverHTML = item.mover
                    ? `<div class="mover-badge font-mono ${item.mover.pct >= 0 ? 'text-green' : 'text-red'}">${item.mover.ticker} ${item.mover.pct >= 0 ? '▲' : '▼'} ${Math.abs(item.mover.pct).toFixed(2)}%</div>`
                    : '';
                card.innerHTML = `
                    <div class="news-meta">
                        <span><span class="tag">${item.tag}</span> | DAY ${item.day}</span>
                        <span class="font-mono">${item.time}</span>
                    </div>
                    <h2 class="news-headline">${item.headline}</h2>
                    <p class="news-body">${item.body}</p>
                    ${moverHTML}
                `;
                wrap.appendChild(card);
            });
            console.log(`[UI REFRESH] Rendered ${displayItems.length} card(s) to screen.`);
        }

        function renderTicker() {
            const el = document.getElementById('ticker-content');
            if (!marketState.stocks || !marketState.stocks.length) return;
            el.innerHTML = marketState.stocks.map(s => {
                const pct = pctChange(s);
                const color = pct > 0 ? 'text-green' : (pct < 0 ? 'text-red' : '');
                const arrow = pct > 0 ? '▲' : (pct < 0 ? '▼' : '—');
                return `<span class="ticker-item">${s.ticker} <span class="${color}">${arrow} ${Math.abs(pct).toFixed(2)}%</span></span>`;
            }).join('');
            console.log(`[TICKER] Refreshed ${marketState.stocks.length} tickers.`);
        }

        function updatePauseUI() {
            const btn = document.getElementById('btn-pause');
            const overlay = document.getElementById('pause-overlay');
            const h2 = overlay.querySelector('h2');
            const p = overlay.querySelector('p');

            if (marketState.sessionEnded) {
                h2.innerText = 'SESSION ENDED';
                p.innerText = 'FINAL RESULTS POSTED ON SYSADMIN SCREEN';
                overlay.style.display = 'flex';
                btn.disabled = true;
                return;
            }
            btn.disabled = false;
            if (marketState.isPaused) {
                h2.innerText = 'MARKET PAUSED';
                p.innerText = 'AWAITING SYSADMIN RESUME...';
                overlay.style.display = 'flex';
                btn.innerText = 'RESUME FEED';
                btn.classList.add('paused');
            } else {
                overlay.style.display = 'none';
                btn.innerText = 'PAUSE FEED';
                btn.classList.remove('paused');
            }
        }

        // ============================================================================
        // 10. DATA FLOW — single entry point for both Firebase snapshots and mock ticks
        // ============================================================================
        function handleMarketUpdate(data) {
            marketState = data;
            document.getElementById('day-display').innerText = `DAY: ${marketState.day}`;
            renderTicker();
            updatePauseUI();
            console.log(`[DATA] Market state updated — Day ${marketState.day}, paused=${marketState.isPaused}, injection=${marketState.activeInjection || 'none'}`);
        }

        // ============================================================================
        // 11. FIREBASE MODE
        // ----------------------------------------------------------------------------
        // Mirrors admin.js's own import pattern exactly:
        //   import { db } from './firebase-config.js';
        //   import { doc, onSnapshot } from ".../firebase-firestore.js";
        // Loaded dynamically (not as static top-level imports) so this file still
        // runs standalone with USE_FIREBASE = false even if firebase-config.js
        // isn't present alongside it.
        // ============================================================================
        async function initFirebase() {
            try {
                const cfg = await import('firebase-config.js');
                const fs = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");
                db = cfg.db;
                fsDoc = fs.doc; fsOnSnapshot = fs.onSnapshot; fsUpdateDoc = fs.updateDoc;

                fsOnSnapshot(fsDoc(db, 'market_state', 'global'), (snap) => {
                    const data = snap.data();
                    if (!data) { console.log('[FIREBASE] market_state/global does not exist yet.'); return; }
                    handleMarketUpdate(data);
                });
                console.log('[FIREBASE] Connected — listening to market_state/global.');
            } catch (err) {
                console.error('[FIREBASE] Connection failed, falling back to mock data.', err);
                startMockMode();
            }
        }

        // ============================================================================
        // 12. MOCK MODE — mirrors engine.js's gameTick() price-update math exactly
        // ============================================================================
        function mockTick() {
            if (marketState.isPaused || marketState.sessionEnded) return;

            let injectionModifier = { trend: 0, volMultiplier: 1, targetSector: 'all' };
            if (marketState.activeInjection && marketState.injectionTicksLeft > 0) {
                injectionModifier = INJECTION_MODIFIERS[marketState.activeInjection] || injectionModifier;
                marketState.injectionTicksLeft--;
                if (marketState.injectionTicksLeft === 0) marketState.activeInjection = null;
            } else if (Math.random() < 0.04) {
                // Standalone demo convenience: occasionally auto-fire a random event
                // so the mock feed has something to talk about without admin.html open.
                const types = Object.keys(INJECTION_MODIFIERS);
                marketState.activeInjection = pick(types);
                marketState.injectionTicksLeft = 10;
                console.log(`[MOCK] Auto-triggered injection: ${marketState.activeInjection}`);
            }

            marketState.stocks = marketState.stocks.map(stock => {
                let activeTrend = stock.trend + GLOBAL_UPWARD_BIAS;
                let activeVol = stock.volatility;
                if (injectionModifier.targetSector === 'all' || injectionModifier.targetSector === stock.sector) {
                    activeTrend += injectionModifier.trend;
                    activeVol *= injectionModifier.volMultiplier;
                }
                const change = stock.price * (activeTrend + (Math.random() - 0.5) * activeVol);
                const newPrice = Math.max(1, stock.price + change);
                return { ...stock, prevPrice: stock.price, price: newPrice };
            });

            marketState.day++;
            handleMarketUpdate(marketState);
        }

        function startMockMode() {
            document.getElementById('mode-badge').innerText = 'MOCK DATA';
            document.getElementById('mode-badge').classList.add('mock');
            marketState.stocks = mockBaseStocks.map(s => ({ ...s, prevPrice: s.price }));
            handleMarketUpdate(marketState);
            setInterval(mockTick, MOCK_TICK_INTERVAL_MS);
            console.log(`[MOCK] Standalone mock market running — tick every ${MOCK_TICK_INTERVAL_MS}ms.`);
        }

        // ============================================================================
        // 13. CONTROLS
        // ============================================================================
        window.togglePause = async () => {
            if (marketState.sessionEnded) return;
            if (USE_FIREBASE && fsUpdateDoc) {
                try {
                    await fsUpdateDoc(fsDoc(db, 'market_state', 'global'), { isPaused: !marketState.isPaused });
                } catch (e) { console.error('[FIREBASE] Pause toggle failed', e); }
            } else {
                marketState.isPaused = !marketState.isPaused;
                handleMarketUpdate(marketState);
            }
        };

        // ============================================================================
        // 14. BOOT
        // ============================================================================
        if (USE_FIREBASE) {
            document.getElementById('mode-badge').innerText = 'LIVE FIREBASE';
            document.getElementById('mode-badge').classList.add('live');
            initFirebase();
        } else {
            startMockMode();
        }

        setInterval(generateNews, NEWS_GEN_INTERVAL);
        setInterval(renderNewsUI, UI_REFRESH_INTERVAL);
        console.log(`[BOOT] News generation every ${NEWS_GEN_INTERVAL}ms, UI refresh every ${UI_REFRESH_INTERVAL}ms.`);

        pushNews({ headline: 'TERMINAL ONLINE', body: 'Awaiting initial market data. Connection to global matrix established.', type: 'neutral', tag: 'SYSTEM' });
        renderNewsUI();
    </script>
</body>
</html>
